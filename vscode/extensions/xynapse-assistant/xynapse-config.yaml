# Xynapse Assistant Configuration
# Place this file in ~/.xynapse/config.yaml
#
# API Keys Setup:
# 1. Create secrets.local.json in the extension folder with:
#    {
#      "apiKey": "your-yandex-api-key",
#      "folderId": "your-folder-id"
#    }
# 2. Or set environment variables:
#    - YANDEX_API_KEY
#    - YANDEX_FOLDER_ID
# 3. Or paste keys directly below (not recommended for shared configs)

name: "Xynapse Config"
version: "1.0.0"
schema: "v1"

# Models configuration
models:
  # ── YandexGPT Foundation Models ──

  # YandexGPT Pro 5 — основная модель 5-го поколения
  - name: "YandexGPT Pro 5"
    provider: "yandex_gpt"
    model: "yandexgpt/rc"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - chat
      - edit
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # YandexGPT Pro 5.1 — улучшенная версия Pro 5
  - name: "YandexGPT Pro 5.1"
    provider: "yandex_gpt"
    model: "yandexgpt/latest"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - chat
      - edit
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # YandexGPT Lite 5 — лёгкая быстрая модель для автодополнения
  - name: "YandexGPT Lite 5"
    provider: "yandex_gpt"
    model: "yandexgpt-lite/rc"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 2048
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # YandexGPT 32K — модель с расширенным контекстом
  - name: "YandexGPT 32K"
    provider: "yandex_gpt"
    model: "yandexgpt-32k/rc"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - summarize
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 16384
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # Alice AI LLM — модель Алисы
  - name: "Alice AI LLM"
    provider: "yandex_gpt"
    model: "alice-ai-llm/latest"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.5
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # ── Сторонние модели на Yandex Cloud ──

  # DeepSeek V3.2 — мощная open-source модель
  - name: "DeepSeek V3.2"
    provider: "yandex_gpt"
    model: "deepseek-v3.2/latest"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - chat
      - edit
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # Qwen3 235B — крупнейшая open-source модель
  - name: "Qwen3 235B"
    provider: "yandex_gpt"
    model: "qwen3-235b-a22b/latest"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # gpt-oss-120b — большая open-source модель
  - name: "gpt-oss-120b"
    provider: "yandex_gpt"
    model: "gpt-oss-120b/latest"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # gpt-oss-20b — компактная open-source модель
  - name: "gpt-oss-20b"
    provider: "yandex_gpt"
    model: "gpt-oss-20b/latest"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 4096
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # Gemma 3 27B — модель Google на Yandex Cloud
  - name: "Gemma 3 27B"
    provider: "yandex_gpt"
    model: "gemma3-27b-it/latest"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

# Context providers
context:
  - provider: "code"
  - provider: "docs"
  - provider: "diff"
  - provider: "terminal"
  - provider: "problems"
  - provider: "folder"
  - provider: "codebase"

# Slash commands
slashCommands:
  - name: "edit"
    description: "Редактировать выделенный код"
  - name: "explain"
    description: "Объяснить выделенный код"
  - name: "comment"
    description: "Добавить комментарии к коду"
  - name: "test"
    description: "Сгенерировать тесты"
  - name: "council"
    description: "Запустить мультиагентное обсуждение (Council)"

# Custom prompts for context menu actions (in Russian)
experimental:
  contextMenuPrompts:
    comment: "Добавь подробные комментарии к этому коду на русском языке. Объясни что делает каждая часть кода."
    docstring: "Напиши подробный docstring для этой функции/класса на русском языке. Включи описание параметров и возвращаемого значения."
    fix: "Исправь ошибки в этом коде. Объясни что было исправлено и почему."
    optimize: "Оптимизируй этот код для лучшей производительности. Объясни какие оптимизации были применены."
    fixGrammar: "Исправь грамматические и орфографические ошибки в этом тексте."
