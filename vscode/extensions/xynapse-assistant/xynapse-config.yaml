# Xynapse Assistant Configuration
# This config is used as a reference template.
# The actual runtime config is at ~/.xynapse/config.yaml

name: "Xynapse Config"
version: "1.0.0"
schema: "v1"

# Response language for the assistant (en, ru, es, fr, de, zh, ja, ko, etc.)
responseLanguage: "en"

# Models configuration
models:
  # YandexGPT Pro - primary model for chat and edit
  - name: "YandexGPT Pro"
    provider: "yandex_gpt"
    model: "yandexgpt"
    apiKey: "YOUR_YANDEX_API_KEY"
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "YOUR_FOLDER_ID"

  # YandexGPT Lite - faster, lighter version for autocomplete
  - name: "YandexGPT Lite"
    provider: "yandex_gpt"
    model: "yandexgpt-lite"
    apiKey: "YOUR_YANDEX_API_KEY"
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 2048
    requestOptions:
      extraBodyProperties:
        folderId: "YOUR_FOLDER_ID"

  # YandexGPT 32K - for large context
  - name: "YandexGPT 32K"
    provider: "yandex_gpt"
    model: "yandexgpt-32k"
    apiKey: "YOUR_YANDEX_API_KEY"
    roles:
      - summarize
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 16384
    requestOptions:
      extraBodyProperties:
        folderId: "YOUR_FOLDER_ID"

# Rules for the assistant
rules:
  - >
    You are Xynapse Assistant, an intelligent development helper.
    When the user asks to create a file, ALWAYS use a path relative to the root of the open project (workspace).
    Be concise and helpful.
  - >
    IMPORTANT: When the user asks to create, edit, or delete files,
    IMMEDIATELY perform the action using the available tools.
    Do NOT ask for confirmation — call the appropriate tool right away.

# Context providers
context:
  - provider: "code"
  - provider: "docs"
  - provider: "diff"
  - provider: "terminal"
  - provider: "problems"
  - provider: "folder"
  - provider: "codebase"

# Slash commands
slashCommands:
  - name: "edit"
    description: "Edit selected code"
  - name: "explain"
    description: "Explain selected code"
  - name: "comment"
    description: "Add comments to code"
  - name: "test"
    description: "Generate tests"
  - name: "council"
    description: "Council"
  - name: "bvc"
    description: "BVC — Budgeted Verified Council"

# Custom prompts for context menu actions
experimental:
  contextMenuPrompts:
    comment: "Add detailed comments to this code. Explain what each part does."
    docstring: "Write a detailed docstring for this function/class. Include descriptions of parameters and return values."
    fix: "Fix errors in this code. Explain what was fixed and why."
    optimize: "Optimize this code for better performance. Explain what optimizations were applied."
    fixGrammar: "Fix grammar and spelling errors in this text."
