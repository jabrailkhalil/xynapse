# Xynapse Assistant Configuration
# This config is used as a reference template.
# The actual runtime config is at ~/.xynapse/config.yaml

name: "Xynapse Config"
version: "1.0.0"
schema: "v1"

# Models configuration
models:
  # YandexGPT Pro - primary model for chat and edit
  - name: "YandexGPT Pro"
    provider: "yandex_gpt"
    model: "yandexgpt"
    apiKey: "YOUR_YANDEX_API_KEY"
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        folderId: "YOUR_FOLDER_ID"

  # YandexGPT Lite - faster, lighter version for autocomplete
  - name: "YandexGPT Lite"
    provider: "yandex_gpt"
    model: "yandexgpt-lite"
    apiKey: "YOUR_YANDEX_API_KEY"
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 2048
    requestOptions:
      extraBodyProperties:
        folderId: "YOUR_FOLDER_ID"

  # YandexGPT 32K - for large context
  - name: "YandexGPT 32K"
    provider: "yandex_gpt"
    model: "yandexgpt-32k"
    apiKey: "YOUR_YANDEX_API_KEY"
    roles:
      - summarize
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 16384
    requestOptions:
      extraBodyProperties:
        folderId: "YOUR_FOLDER_ID"

# Rules for the assistant
rules:
  - >
    Ты — Xynapse Assistant, умный помощник для разработки.
    Когда пользователь просит создать файл, ВСЕГДА используй путь относительно корня открытого проекта (workspace).
    Отвечай на русском языке. Будь лаконичным и полезным.
  - >
    ВАЖНО: Когда пользователь просит создать, отредактировать или удалить файлы,
    НЕМЕДЛЕННО выполняй действие с помощью доступных инструментов.
    НЕ спрашивай подтверждения — сразу вызывай нужный инструмент.

# Context providers
context:
  - provider: "code"
  - provider: "docs"
  - provider: "diff"
  - provider: "terminal"
  - provider: "problems"
  - provider: "folder"
  - provider: "codebase"

# Slash commands
slashCommands:
  - name: "edit"
    description: "Редактировать выделенный код"
  - name: "explain"
    description: "Объяснить выделенный код"
  - name: "comment"
    description: "Добавить комментарии к коду"
  - name: "test"
    description: "Сгенерировать тесты"
  - name: "council"
    description: "Council"

# Custom prompts for context menu actions (in Russian)
experimental:
  contextMenuPrompts:
    comment: "Добавь подробные комментарии к этому коду на русском языке. Объясни что делает каждая часть кода."
    docstring: "Напиши подробный docstring для этой функции/класса на русском языке. Включи описание параметров и возвращаемого значения."
    fix: "Исправь ошибки в этом коде. Объясни что было исправлено и почему."
    optimize: "Оптимизируй этот код для лучшей производительности. Объясни какие оптимизации были применены."
    fixGrammar: "Исправь грамматические и орфографические ошибки в этом тексте."
