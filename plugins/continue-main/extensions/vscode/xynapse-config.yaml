# Xynapse Assistant Configuration
# Place this file in ~/.xynapse/config.yaml
#
# API Keys Setup:
# 1. Create secrets.local.json in the extension folder with:
#    {
#      "apiKey": "your-yandex-api-key",
#      "folderId": "your-folder-id"
#    }
# 2. Or set environment variables:
#    - YANDEX_API_KEY
#    - YANDEX_FOLDER_ID
# 3. Or paste keys directly below (not recommended for shared configs)

name: "Xynapse Config"
version: "1.0.0"
schema: "v1"

# Models configuration
models:
  # YandexGPT Pro - primary model for chat and edit
  - name: "YandexGPT Pro"
    provider: "yandex_gpt"
    model: "yandexgpt"
    # Option 1: Use environment variable (recommended)
    apiKey: "$YANDEX_API_KEY"
    # Option 2: Paste directly (not recommended)
    # apiKey: "YOUR_YANDEX_API_KEY"
    roles:
      - chat
      - edit
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        # Option 1: Use environment variable (recommended)
        folderId: "$YANDEX_FOLDER_ID"
        # Option 2: Paste directly (not recommended)
        # folderId: "YOUR_FOLDER_ID"

  # YandexGPT Lite - faster, lighter version for autocomplete
  - name: "YandexGPT Lite"
    provider: "yandex_gpt"
    model: "yandexgpt-lite"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 2048
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

  # YandexGPT 32K - for large context
  - name: "YandexGPT 32K"
    provider: "yandex_gpt"
    model: "yandexgpt-32k"
    apiKey: "$YANDEX_API_KEY"
    roles:
      - summarize
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 16384
    requestOptions:
      extraBodyProperties:
        folderId: "$YANDEX_FOLDER_ID"

# Context providers
context:
  - provider: "code"
  - provider: "docs"
  - provider: "diff"
  - provider: "terminal"
  - provider: "problems"
  - provider: "folder"
  - provider: "codebase"

# Slash commands
slashCommands:
  - name: "edit"
    description: "Редактировать выделенный код"
  - name: "explain"
    description: "Объяснить выделенный код"
  - name: "comment"
    description: "Добавить комментарии к коду"
  - name: "test"
    description: "Сгенерировать тесты"

# Custom prompts for context menu actions (in Russian)
experimental:
  contextMenuPrompts:
    comment: "Добавь подробные комментарии к этому коду на русском языке. Объясни что делает каждая часть кода."
    docstring: "Напиши подробный docstring для этой функции/класса на русском языке. Включи описание параметров и возвращаемого значения."
    fix: "Исправь ошибки в этом коде. Объясни что было исправлено и почему."
    optimize: "Оптимизируй этот код для лучшей производительности. Объясни какие оптимизации были применены."
    fixGrammar: "Исправь грамматические и орфографические ошибки в этом тексте."
